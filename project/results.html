<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results — FreshMart</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="main.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .active-filter-tag {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 4px 12px; border-radius: 20px; font-size: 12px;
            font-weight: 600; background: #dcfce7; color: #16a34a;
            border: 1px solid #bbf7d0;
        }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .product-animate { animation: fadeUp 0.35s ease forwards; }
    </style>
</head>
<body class="antialiased bg-gray-50">

    <!-- HEADER -->
    <header class="glass-header sticky top-0 z-40">
        <div class="max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 lg:h-20">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-green-400 to-green-600 rounded-xl flex items-center justify-center text-white text-xl lg:text-2xl shadow-lg shadow-green-200">
                        <i class="fas fa-shopping-basket"></i>
                    </div>
                    <span class="text-xl lg:text-2xl font-bold font-montserrat tracking-tight">FreshMart<span class="text-green-500">.</span></span>
                </a>
                <div class="flex items-center gap-3">
                    <a href="index.html" class="flex items-center gap-2 text-gray-600 hover:text-green-600 font-semibold text-sm transition"><i class="fas fa-home"></i> Back to Home</a>
                    <button id="cartBtn" class="relative p-2 text-gray-600 hover:bg-green-50 hover:text-green-600 rounded-full transition">
                        <i class="fas fa-shopping-cart text-lg"></i>
                        <span id="headerCartCount" class="absolute -top-1 -right-1 w-5 h-5 bg-green-500 text-white text-xs font-bold rounded-full flex items-center justify-center">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- CONTENT -->
    <div class="max-w-[1920px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Results Header -->
        <div class="mb-8 border-b pb-6">
            <h1 class="text-3xl font-montserrat font-extrabold text-gray-800 mb-2">Search Results</h1>
            <p class="text-gray-500"><span id="resultCount" class="font-bold text-green-600">0</span> items found matching your criteria</p>
        </div>

        <!-- Active Filters Summary -->
        <div id="filterSummary" class="flex flex-wrap items-center gap-2 mb-8">
            <span class="text-sm font-semibold text-gray-600"><i class="fas fa-filter text-green-500 mr-2"></i>Applied Filters:</span>
            <div id="summaryTags" class="flex flex-wrap gap-2"></div>
            <a href="index.html" class="text-sm text-green-600 font-semibold hover:underline ml-2">New Search</a>
        </div>

        <!-- Product Grid -->
        <div id="productGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 xl:grid-cols-6 gap-4 md:gap-6"></div>

        <!-- No Results -->
        <div id="noResults" class="hidden text-center py-20">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-search text-4xl text-gray-300"></i>
            </div>
            <h4 class="font-bold text-gray-800 text-lg mb-2">No matching products</h4>
            <p class="text-gray-500 mb-6">We couldn't find any items that match your current filter selection.</p>
            <a href="index.html" class="btn-primary inline-flex items-center px-8">Try New Search</a>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast fixed top-24 right-6 z-50 bg-white rounded-xl shadow-2xl p-4 flex items-center gap-3 min-w-[300px]">
        <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center"><i class="fas fa-check-circle text-green-500 text-lg"></i></div>
        <div><h4 id="toast-title" class="font-bold text-gray-800">Success!</h4><p id="toast-message" class="text-sm text-gray-600"></p></div>
    </div>

<script>
// Mock Products (Same as main database)
const allProducts = [
    {id:1,name:'Organic Red Apples',category:'fruits',subcategory:'Apple',price:4.99,originalPrice:6.99,unit:'lb',image:'https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?w=400&q=80',rating:4.8,reviews:124,store:'Green Valley Market',discount:29,organic:true,fresh:true},
    {id:2,name:'Fresh Broccoli',category:'vegetables',subcategory:'Broccoli',price:2.49,originalPrice:3.49,unit:'bunch',image:'https://images.unsplash.com/photo-1459411552884-841db9b3cc2a?w=400&q=80',rating:4.6,reviews:89,store:'Fresh Choice Organics',discount:29,organic:false,fresh:true},
    {id:3,name:'Whole Milk',category:'dairy',subcategory:'Milk',price:3.99,originalPrice:4.99,unit:'gallon',image:'https://images.unsplash.com/photo-1563636619-e9143da7973b?w=400&q=80',rating:4.9,reviews:256,store:'Super Saver Mart',discount:20,organic:false,fresh:false},
    {id:4,name:'Sourdough Bread',category:'bakery',subcategory:'Bread',price:5.99,originalPrice:7.99,unit:'loaf',image:'https://images.unsplash.com/photo-1585478259715-876acc5be8eb?w=400&q=80',rating:4.7,reviews:67,store:'Sunrise Bakery',discount:25,organic:false,fresh:true},
    {id:5,name:'Organic Bananas',category:'fruits',subcategory:'Banana',price:1.49,originalPrice:1.99,unit:'lb',image:'https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?w=400&q=80',rating:4.5,reviews:198,store:'Green Valley Market',discount:25,organic:true,fresh:true},
    {id:6,name:'Fresh Spinach',category:'vegetables',subcategory:'Spinach',price:3.99,originalPrice:4.99,unit:'bag',image:'https://images.unsplash.com/photo-1576045057995-568f588f82fb?w=400&q=80',rating:4.8,reviews:145,store:'Fresh Choice Organics',discount:20,organic:true,fresh:true},
    {id:7,name:'Greek Yogurt',category:'dairy',subcategory:'Yogurt',price:5.49,originalPrice:6.99,unit:'32oz',image:'https://images.unsplash.com/photo-1488477181946-6428a0291777?w=400&q=80',rating:4.7,reviews:89,store:'Super Saver Mart',discount:21,organic:false,fresh:false},
    {id:8,name:'Atlantic Salmon',category:'meat',subcategory:'Salmon',price:12.99,originalPrice:16.99,unit:'lb',image:'https://images.unsplash.com/photo-1599084993091-1cb5c0721cc6?w=400&q=80',rating:4.9,reviews:234,store:'The Prime Cut',discount:24,organic:false,fresh:true},
];

document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const filters = {
        cat: params.get('cat'),
        sub: params.get('sub'),
        price: params.get('price'),
        rating: params.get('rating'),
        organic: params.get('organic'),
        q: params.get('q')
    };

    // Filter logic
    let results = [...allProducts];
    if (filters.cat) results = results.filter(p => p.category === filters.cat);
    if (filters.sub) {
        const subs = filters.sub.split(',');
        results = results.filter(p => subs.includes(p.subcategory));
    }
    if (filters.price) results = results.filter(p => p.price <= parseFloat(filters.price));
    if (filters.rating) results = results.filter(p => p.rating >= parseFloat(filters.rating));
    if (filters.organic === 'true') results = results.filter(p => p.organic);
    if (filters.q) {
        const q = filters.q.toLowerCase();
        results = results.filter(p => p.name.toLowerCase().includes(q) || p.store.toLowerCase().includes(q));
    }

    // Update UI
    document.getElementById('resultCount').textContent = results.length;
    const grid = document.getElementById('productGrid');
    if (results.length === 0) {
        document.getElementById('noResults').classList.remove('hidden');
    } else {
        grid.innerHTML = results.map((p, i) => `
            <div class="product-card product-animate bg-white rounded-2xl overflow-hidden border border-gray-100 group shadow-sm hover:shadow-md transition" style="animation-delay:${i*0.05}s">
                <div class="relative h-40 overflow-hidden cursor-pointer" onclick="window.location.href='product.html?id=${p.id}'">
                    <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    ${p.discount ? `<span class="promo-tag absolute top-3 left-3">-${p.discount}%</span>` : ''}
                </div>
                <div class="p-4">
                    <p class="text-[10px] text-gray-500 mb-1 uppercase tracking-wider">${p.store}</p>
                    <h4 class="font-bold text-gray-800 text-sm mb-2 line-clamp-2 cursor-pointer hover:text-green-600 transition" onclick="window.location.href='product.html?id=${p.id}'">${p.name}</h4>
                    <div class="flex items-center gap-1 mb-2">
                        <i class="fas fa-star text-yellow-400 text-xs"></i>
                        <span class="text-xs font-bold text-gray-700">${p.rating}</span>
                    </div>
                    <div class="flex items-center justify-between mt-auto">
                        <span class="text-lg font-bold text-green-600">$${p.price.toFixed(2)}</span>
                        <button class="w-8 h-8 bg-green-500 text-white rounded-full flex items-center justify-center hover:bg-green-600 transition" onclick="showToast('Added!', 'Item added to cart')">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Build summary tags
    const tags = [];
    if (filters.cat) tags.push(`Category: ${filters.cat}`);
    if (filters.sub) tags.push(`Subcategories: ${filters.sub}`);
    if (filters.price) tags.push(`Up to $${filters.price}`);
    if (filters.rating) tags.push(`${filters.rating}+ Stars`);
    if (filters.organic === 'true') tags.push('Organic Only');
    if (filters.q) tags.push(`Search: "${filters.q}"`);

    document.getElementById('summaryTags').innerHTML = tags.map(t => 
        `<span class="active-filter-tag">${t}</span>`
    ).join('');
});

function showToast(t, m) {
    document.getElementById('toast-title').textContent = t;
    document.getElementById('toast-message').textContent = m;
    document.getElementById('toast').classList.add('show');
    setTimeout(() => document.getElementById('toast').classList.remove('show'), 3000);
}
</script>
</body>
</html>
